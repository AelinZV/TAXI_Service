name: Сборка и интеграционное тестирование

# Запускать при пушах и пулл-реквестах в main/master
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Выгрузка исходного кода
        uses: actions/checkout@v4

      - name: Установка JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Сборка Docker-образов
        run: docker compose build --no-cache

      - name: Запуск контейнеров
        run: docker compose up -d

      - name: Ожидание готовности микросервисов
        run: |
          echo "⏳ Ожидаем старта сервисов (макс. 5 минут)..."

          MAX_ATTEMPTS=60
          SLEEP_SECONDS=5

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            # Проверяем каждый сервис отдельно, сохраняем код ответа
            CODE_8081=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/actuator/health 2>/dev/null || echo "000")
            CODE_8082=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8082/actuator/health 2>/dev/null || echo "000")
            CODE_8083=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8083/actuator/health 2>/dev/null || echo "000")

            # Если все три вернули 200 — выходим из цикла немедленно
            if [[ "$CODE_8081" == "200" && "$CODE_8082" == "200" && "$CODE_8083" == "200" ]]; then
              echo "✅ Все сервисы готовы (попытка $attempt/$MAX_ATTEMPTS)!"
              echo "   user-service: $CODE_8081 | trip-service: $CODE_8082 | notification-service: $CODE_8083"
              break
            fi

            # Показываем прогресс, но только каждые 5 попыток, чтобы не спамить лог
            if (( attempt % 5 == 0 )); then
              echo "⏳ Попытка $attempt/$MAX_ATTEMPTS | user: $CODE_8081 | trip: $CODE_8082 | notif: $CODE_8083"
            fi

            # Ждём перед следующей проверкой
            sleep $SLEEP_SECONDS
          done

          # Финальная жёсткая проверка: если хоть один сервис не 200 — падаем
          FINAL_8081=$(curl -sf http://localhost:8081/actuator/health || exit 1)
          FINAL_8082=$(curl -sf http://localhost:8082/actuator/health || exit 1)
          FINAL_8083=$(curl -sf http://localhost:8083/actuator/health || exit 1)

          echo "✅ Health checks passed. Переходим к тестам."

      - name: Прогон интеграционного демо-скрипта
        run: |
          chmod +x demo.sh
          echo " Запуск демонстрационного сценария..."
          ./demo.sh

      # Если что-то упало — сохраняем логи Docker для отладки
      - name: Сохранение логов при ошибке
        if: failure()
        run: docker compose logs --no-color > ci-failure-logs.txt

      - name: Загрузка логов в артефакты
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-on-failure
          path: ci-failure-logs.txt
          retention-days: 7

      # Очистка ресурсов в любом случае (успех или ошибка)
      - name: Очистка контейнеров и томов
        if: always()
        run: docker compose down -v --remove-orphans