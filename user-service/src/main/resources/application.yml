server:
  port: ${SERVER_PORT:8081}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taxi_db}
    username: ${SPRING_DATASOURCE_USERNAME:taxi}
    password: ${SPRING_DATASOURCE_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  redis:
    host: ${SPRING_DATA_REDIS_HOST:localhost}
    port: 6379

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyForJwtTokens123456789}
  expiration: 86400000